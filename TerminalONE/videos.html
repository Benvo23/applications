<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TerminalONE - Video Player</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #0f0f0f; color: #f1f1f1; min-height: 100vh; }
    header { position: fixed; top: 0; left: 0; right: 0; height: 56px; background: #0f0f0f; border-bottom: 1px solid #272727; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; z-index: 100; }
    .logo { display: flex; align-items: center; gap: 8px; text-decoration: none; }
    .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, #0ea5e9, #0284c7); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .logo-text { font-size: 1.3rem; font-weight: 700; color: #f1f1f1; letter-spacing: -0.5px; }
    .logo-text span { color: #0ea5e9; }
    .header-right { display: flex; align-items: center; gap: 8px; }
    .icon-btn { width: 40px; height: 40px; border-radius: 50%; background: transparent; border: none; color: #f1f1f1; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
    .icon-btn:hover { background: #272727; }
    .avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, #0ea5e9, #0284c7); display: flex; align-items: center; justify-content: center; font-size: 0.9rem; font-weight: 600; cursor: pointer; }
    main { padding: 76px 24px 24px; max-width: 1200px; margin: 0 auto; }
    .video-player { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; }
    .video-player iframe { width: 100%; height: 100%; border: none; }
    .video-info { padding: 16px 0; }
    .video-title { font-size: 1.25rem; font-weight: 600; line-height: 1.4; margin-bottom: 12px; }
    .video-stats { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
    .view-count { color: #aaa; font-size: 0.95rem; }
    .video-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .action-btn { display: flex; align-items: center; gap: 6px; padding: 10px 16px; background: #272727; border: none; border-radius: 20px; color: #f1f1f1; font-size: 0.9rem; cursor: pointer; transition: all 0.2s ease; }
    .action-btn:hover { background: #3d3d3d; }
    .channel-section { display: flex; align-items: flex-start; justify-content: space-between; padding: 16px 0; border-top: 1px solid #272727; border-bottom: 1px solid #272727; margin-top: 16px; }
    .channel-info { display: flex; gap: 12px; }
    .channel-avatar { width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, #0ea5e9, #0284c7); display: flex; align-items: center; justify-content: center; font-size: 1rem; font-weight: 600; }
    .channel-details { display: flex; flex-direction: column; gap: 4px; }
    .channel-name { font-weight: 600; font-size: 1rem; }
    .subscriber-count { color: #aaa; font-size: 0.85rem; }
    .subscribe-btn { padding: 10px 20px; background: #f1f1f1; border: none; border-radius: 20px; color: #0f0f0f; font-size: 0.95rem; font-weight: 600; cursor: pointer; }
    .subscribe-btn:hover { background: #d9d9d9; }
    .description-box { background: #272727; border-radius: 12px; padding: 16px; margin-top: 16px; }
    .description-stats { font-size: 0.9rem; font-weight: 500; margin-bottom: 8px; }
    .description-text { font-size: 0.9rem; line-height: 1.6; color: #e0e0e0; }
    .error-message { text-align: center; padding: 100px 20px; }
    .error-message h1 { font-size: 2rem; margin-bottom: 16px; }
    .error-message p { color: #aaa; margin-bottom: 24px; }
    .error-message a { color: #0ea5e9; text-decoration: none; }
    @media (max-width: 768px) { .video-title { font-size: 1.1rem; } .video-stats { flex-direction: column; align-items: flex-start; } }
  </style>
</head>
<body>
  <header>
    <a href="index.html" class="logo">
      <div class="logo-icon">✈</div>
      <div class="logo-text">Terminal<span>ONE</span></div>
    </a>
    <div class="header-right">
      <button class="icon-btn">+</button>
      <button class="icon-btn">🔔</button>
      <div class="avatar">A</div>
    </div>
  </header>

  <main id="main-content">
    <div class="error-message" id="error" style="display:none;">
      <h1>Video not found</h1>
      <p>The video you're looking for doesn't exist.</p>
      <a href="index.html">← Back to Home</a>
    </div>

    <div id="video-container">
      <div class="video-player">
        <iframe id="video-iframe" src="" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
      </div>

      <div class="video-info">
        <h1 class="video-title" id="video-title">Loading...</h1>
        <div class="video-stats">
          <span class="view-count" id="video-views">Loading...</span>
          <div class="video-actions">
            <button class="action-btn">👍 Like</button>
            <button class="action-btn">👎 Dislike</button>
            <button class="action-btn">✈ Share</button>
            <button class="action-btn">📁 Save</button>
          </div>
        </div>
      </div>

      <div class="channel-section">
        <div class="channel-info">
          <div class="channel-avatar" id="channel-initials">--</div>
          <div class="channel-details">
            <div class="channel-name" id="channel-name">Loading...</div>
            <div class="subscriber-count">YouTube Channel</div>
          </div>
        </div>
        <button class="subscribe-btn">Subscribe</button>
      </div>

      <div class="description-box">
        <div class="description-stats" id="description-stats">Loading...</div>
        <div class="description-text">Watch this aviation video on TerminalONE!</div>
      </div>
    </div>
  </main>

  <script>
    // Video database - maps video IDs to metadata
    const videoDatabase = {
      // Original videos
      'EMIMkR7VhEI': { title: 'Stunning 777 Night Landing in Snow and Crosswind - Chicago', channel: 'High Pressure Aviation', views: '2.4M views', published: '2 weeks ago' },
      'YfbOs_LJANE': { title: 'Sam Chui Flight Review - Best Airlines 2025', channel: 'Sam Chui', views: '3.4M views', published: '1 week ago' },
      'lw6mjVIdbbc': { title: 'Can a Passenger Land a Plane? Captain Joe Explains', channel: 'Captain Joe', views: '5.6M views', published: '3 days ago' },
      'AsswlMIo4vY': { title: 'Jeb Brooks Airline Cabin Review - Business Class Comparison', channel: 'Jeb Brooks', views: '679K views', published: '4 days ago' },
      'o-zgjQVR1to': { title: 'Military Aviation - Fighter Jets and Helicopters in Action', channel: 'Sam Eckholm', views: '400K views', published: '2 days ago' },
      '3AeYIUyZXKE': { title: 'Flying First Class on Emirates A380 - Travel Vlog', channel: 'Casey Neistat', views: '8.4M views', published: '1 week ago' },
      'Ke689XVd7dw': { title: 'Aviation News Weekly - Simple Flying Report', channel: 'Simple Flying', views: '1.2M views', published: '1 week ago' },
      'iUD55KscxsA': { title: 'Captain Joe TEDx Talk - How Aviation Changed My Life', channel: 'Captain Joe', views: '2.9M views', published: '3 months ago' },
      'Af3fVp8R8bg': { title: 'Multi-Engine Landing Techniques - Pilot Training Guide', channel: 'Guido Warneke', views: '567K views', published: '2 weeks ago' },
      '-QAt_pOQwZQ': { title: 'Cessna Caravan Landing in Gusty Crosswind - Incredible Pilot Skills', channel: 'PlaneSpotter', views: '3.2M views', published: '3 weeks ago' },
    };

    // Get video ID from URL parameter
    const urlParams = new URLSearchParams(window.location.search);
    const videoId = urlParams.get('v');

    function getInitials(name) {
      return name.split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase();
    }

    function loadVideo() {
      if (!videoId) {
        document.getElementById('error').style.display = 'block';
        document.getElementById('video-container').style.display = 'none';
        return;
      }

      // Set iframe source
      document.getElementById('video-iframe').src = `https://www.youtube.com/embed/${videoId}`;

      // Try to get metadata from database, otherwise use defaults
      const meta = videoDatabase[videoId] || {
        title: 'Aviation Video',
        channel: 'YouTube Channel',
        views: 'Views',
        published: 'Recently'
      };

      document.getElementById('video-title').textContent = meta.title;
      document.getElementById('video-views').textContent = `${meta.views} • ${meta.published}`;
      document.getElementById('channel-name').textContent = meta.channel;
      document.getElementById('channel-initials').textContent = getInitials(meta.channel);
      document.getElementById('description-stats').textContent = `${meta.views} • ${meta.published}`;
      document.title = `TerminalONE - ${meta.title}`;
    }

    // Load video on page load
    loadVideo();
  </script>
</body>
</html>
