        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        function highlightText(text, query) {
            if (!query) return text;
            const words = query.toLowerCase().split(/\s+/);
            let result = text;
            words.forEach(word => {
                if (word.length > 2) {
                    const regex = new RegExp(`(${word})`, 'gi');
                    result = result.replace(regex, '<mark>$1</mark>');
                }
            });
            return result;
        }

        function search(query) {
            if (!query || query.trim() === '') {
                return [];
            }

            const queryLower = query.toLowerCase();
            const queryWords = queryLower.split(/\s+/).filter(w => w.length > 1);

            const results = searchIndex.map(item => {
                let score = 0;

                // Check title
                if (item.title.toLowerCase().includes(queryLower)) {
                    score += 10;
                }
                queryWords.forEach(word => {
                    if (item.title.toLowerCase().includes(word)) {
                        score += 5;
                    }
                });

                // Check content
                queryWords.forEach(word => {
                    if (item.content.toLowerCase().includes(word)) {
                        score += 3;
                    }
                });

                // Check keywords
                item.keywords.forEach(keyword => {
                    if (queryLower.includes(keyword) || keyword.includes(queryLower)) {
                        score += 8;
                    }
                    queryWords.forEach(word => {
                        if (keyword.includes(word)) {
                            score += 4;
                        }
                    });
                });

                return { ...item, score };
            });

            return results
                .filter(r => r.score > 0)
                .sort((a, b) => b.score - a.score);
        }

        function displayResults(query, results) {
            const container = document.getElementById('search-results');
            const loading = document.getElementById('search-loading');
            const queryText = document.getElementById('query-text');

            loading.style.display = 'none';
            queryText.textContent = query;

            if (results.length === 0) {
                container.innerHTML = `
                    <div class="info-box">
                        <strong>No results found for "${query}"</strong><br><br>
                        Try searching for:
                        <ul style="margin-top: 0.5rem;">
                            <li>Player names (Ohtani, Betts, Freeman)</li>
                            <li>Topics (World Series, history, stadium)</li>
                            <li>Stats (batting, pitching, standings)</li>
                        </ul>
                    </div>
                `;
                return;
            }

            container.innerHTML = `<p style="color: #666; margin-bottom: 1rem;">Found ${results.length} result${results.length > 1 ? 's' : ''}</p>`;

            results.forEach(result => {
                const resultDiv = document.createElement('div');
                resultDiv.className = 'search-result';
                resultDiv.innerHTML = `
                    <a href="${result.url}" class="search-result-title">${highlightText(result.title, query)}</a>
                    <div class="search-result-url">${result.url}</div>
                    <div class="search-result-snippet">${highlightText(result.content, query)}</div>
                `;
                container.appendChild(resultDiv);
            });
        }

        function setupExternalLinks(query) {
            if (!query) return;

            const encodedQuery = encodeURIComponent(query + ' Dodgers');
            const encodedQueryBase = encodeURIComponent(query);

            // Set up external links
            document.getElementById('link-mlb').href = `https://www.mlb.com/search?q=${encodedQueryBase}&teamId=119`;
            document.getElementById('link-espn').href = `https://www.espn.com/search/_/q/${encodedQuery}`;
            document.getElementById('link-br').href = `https://www.baseball-reference.com/search/search.fcgi?search=${encodedQuery}`;
            document.getElementById('link-fangraphs').href = `https://www.fangraphs.com/players.aspx?search=${encodedQueryBase}`;
            document.getElementById('link-twitter').href = `https://twitter.com/search?q=${encodedQuery}`;
            document.getElementById('link-youtube').href = `https://www.youtube.com/results?search_query=${encodedQuery}`;
            document.getElementById('link-tiktok').href = `https://www.tiktok.com/search?q=${encodedQuery}`;
            document.getElementById('link-instagram').href = `https://www.instagram.com/explore/tags/${encodeURIComponent(query.replace(/\s+/g, ''))}dodgers/`;

            // Show the external links section
            document.getElementById('external-links').style.display = 'block';
        }

        // Initialize search
        document.addEventListener('DOMContentLoaded', function() {
            const query = getQueryParam('q');
            const searchInput = document.getElementById('search-input');

            if (query) {
                searchInput.value = query;
                const results = search(query);
                displayResults(query, results);
                setupExternalLinks(query);
            } else {
                document.getElementById('search-loading').style.display = 'none';
                document.getElementById('search-query-display').innerHTML = 'Enter a search term above to find Dodgers information.';
